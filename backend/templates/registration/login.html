<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太陽能追日系統登入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F7F2FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(28, 27, 31, 0.12);
            max-width: 400px;
            width: 100%;
            margin: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #1C1B1F;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .login-header p {
            color: #718096;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.95em;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: none;
            border-bottom: 1px solid #79747E;
            border-radius: 10px 10px 0 0;
            background: #E7E0EC;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-bottom: 2px solid #6750A4;
            box-shadow: none;
        }

        .login-btn {
            width: 100%;
            background: #6750A4;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        .login-btn:hover {
            background: #5B4791;
            box-shadow: 0 2px 6px rgba(28, 27, 31, 0.2);
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .error-message {
            background: #F9DEDC;
            color: #410E0B;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: none;
            font-weight: 500;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer a {
            color: #6750A4;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .login-header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1> 太陽能追日系統</h1>
            <p>請登入以存取監控儀表板</p>
        </div>
        
        {% if form.errors %}
            <div class="error-message">
                ⚠️ 使用者名稱或密碼錯誤，請重新輸入
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">使用者名稱</label>
                <input type="text" name="username" id="id_username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="id_password">密碼</label>
                <input type="password" name="password" id="id_password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="login-btn"> 登入系統</button>
        </form>
        
        <div class="footer">
            <a href="/admin/">管理後台</a>
        </div>
    </div>
</body>
</html>
