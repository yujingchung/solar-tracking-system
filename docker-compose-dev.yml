services:
  db:
    container_name: solar_db
    image: mysql:8.0
    restart: always
    command: mysqld --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql:/var/lib/mysql
    env_file:
      - ./.env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_ROOT_PASSWORD:-rootpassword123}
      MYSQL_USER: ${SQL_USER:-solar_user}
      MYSQL_PASSWORD: ${SQL_PASSWORD:-userpassword123}
      MYSQL_DATABASE: ${SQL_DATABASE:-solar_tracking_db}

  backend:
    container_name: solar_backend
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/:/usr/src/app/
      - ./data/:/usr/src/app/data/:ro
    env_file:
      - ./.env.dev
    ports:
      - 8000:8000
    depends_on:
      - db
      - tailscale

  tailscale:
    container_name: solar_tailscale
    image: tailscale/tailscale:latest
    hostname: solar-dashboard-zhiyu
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      - TS_EXTRA_ARGS=--reset --accept-dns=false --advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

volumes:
  tailscale-state:
